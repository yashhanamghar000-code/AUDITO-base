version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: audito-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/backend/data
      - ./backend/chroma_db:/backend/chroma_db
      - ./backend/bm25_cache:/backend/bm25_cache
      - ./backend/chat_history:/backend/chat_history
      - ./backend/debug_logs:/backend/debug_logs
      - ./backend/temp_uploads:/backend/temp_uploads
    depends_on:
      - postgres
      - qdrant
      - redis

  worker:
    build:
      context: ./backend
    container_name: audito-worker
    # Was `-A app.tasks`, which has no Celery app instance in it — the
    # actual Celery() object lives in app/celery_app.py as `celery_app`.
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=3
    env_file:
      - ./backend/.env
    volumes:
      # Was `./backend:/app` — the Dockerfile's WORKDIR is /backend, and
      # the web process writes uploads/vectors/history relative to that
      # same path. Mounting to /app put the worker in a totally different
      # filesystem, so it could never find files the web process saved.
      # These five mounts now match the `backend` service exactly.
      - ./backend/data:/backend/data
      - ./backend/chroma_db:/backend/chroma_db
      - ./backend/bm25_cache:/backend/bm25_cache
      - ./backend/chat_history:/backend/chat_history
      - ./backend/debug_logs:/backend/debug_logs
      - ./backend/temp_uploads:/backend/temp_uploads
    depends_on:
      - postgres
      - redis
    # concurrency=3: lets up to 3 users' uploads run at the same time instead
    # of one file (e.g. a 49MB report) blocking every other user's upload
    # until it finishes — which is what concurrency=1 caused. parser.py's
    # own per-file thread count (PARSER_MAX_WORKERS) is capped lower to
    # compensate, so 3 concurrent files still don't oversubscribe the CPU.
    #
    # Scale across machines later with, e.g.:
    #   docker compose up --scale worker=3

  postgres:
    image: postgres:16
    container_name: audito-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: audito_user
      POSTGRES_PASSWORD: audito_pass
      POSTGRES_DB: audito_db
    ports:
      - "5432:5432"
    volumes:
      - audito_pg_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: audito-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - audito_qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: audito-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  audito_pg_data:
  audito_qdrant_data: